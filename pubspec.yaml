name: diakron_collectors
description: "Diakron Collectors"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_local_notifications: ^21.0.0
  flutter_localizations:
    sdk: flutter
  freezed_annotation: ^3.1.0
  geolocator: ^14.0.2
  go_router: ^17.1.0
  http: ^1.6.0
  json_annotation: ^4.11.0
  logger: ^2.7.0
  mapbox_maps_flutter: ^2.21.1
  mobile_scanner: ^7.2.0
  provider: ^6.1.5+1
  qr_flutter: ^4.1.0
  supabase_flutter: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.2
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/
    - assets/images/
    - assets/symbols/